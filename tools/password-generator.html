<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Password Generator | Toolharbour</title>
  <meta name="description" content="Create a quick random password.">
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <main class="tool-shell">
    <div class="tool-header">
      <a href="../index.html">← Toolharbour</a>
      <span class="small">Free online tool</span>
    </div>
    <section class="tool-panel">
      <h1>Password Generator</h1>
      <p class="small">Create a quick random password.</p>
      <label>Password length</label><input id="len" type="number" value="16" min="6" max="64"><button onclick="gen()">Generate password</button><div class="result" id="result">Result will appear here.</div>
    </section>
  </main>
  <script>function gen(){let chars='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789!@#$%^&*'; let out=''; for(let i=0;i<(+len.value||16);i++) out+=chars[Math.floor(Math.random()*chars.length)]; result.textContent=out;}</script>
</body>
</html>
