<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Random Number Generator | Toolharbour</title>
  <meta name="description" content="Generate a random number between two values.">
  <link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
  <main class="tool-shell">
    <div class="tool-header">
      <a href="../index.html">← Toolharbour</a>
      <span class="small">Free online tool</span>
    </div>
    <section class="tool-panel">
      <h1>Random Number Generator</h1>
      <p class="small">Generate a random number between two values.</p>
      <label>Minimum</label><input id="min" type="number" value="1"><label>Maximum</label><input id="max" type="number" value="100"><button onclick="gen()">Generate</button><div class="result" id="result">Result will appear here.</div>
    </section>
  </main>
  <script>function gen(){let a=+min.value,b=+max.value; if(a>b){[a,b]=[b,a]} result.textContent=Math.floor(Math.random()*(b-a+1))+a;}</script>
</body>
</html>
